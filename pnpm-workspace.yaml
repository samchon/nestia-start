packages:
  - "config"
  - "packages/*"
catalogs:
  samchon:
    "@nestia/benchmark": &nestia ^12.0.0-rc.3
    "@nestia/core": *nestia
    "@nestia/e2e": *nestia
    "@nestia/fetcher": *nestia
    "@nestia/sdk": *nestia
    nestia: *nestia
    tgrid: ^1.2.1
    tstl: ^3.0.0
    typia: ^13.0.0
  utils:
    rimraf: ^6.1.3
    uuid: ^13.0.0
  typescript:
    "@ttsc/lint": &ttsc ^0.18.0
    "@ttsc/paths": *ttsc
    "@ttsc/unplugin": *ttsc
    ttsc: *ttsc
    typescript: ^7.0.2
